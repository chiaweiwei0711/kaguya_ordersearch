<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="https://duk.tw/ZhYY5L.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kaguya代購專用 - 自助訂單查詢、訂金計算、尾款下單整合平台</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          /* 🍎 終極咒語：優先呼叫 Apple 設備的『蘋方體』，沒有的話就用『思源黑體』！ */
          sans: ['-apple-system', 'BlinkMacSystemFont', '"PingFang TC"', '"Noto Sans TC"', 'sans-serif'],
        }
      }
    }
  </script>

  <style>
    body {
      /* 🍎 雙重保險，確保整個網頁都充滿高級的 Apple 俐落感 */
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif !important;
      font-weight: 400;
      /* 預設讓所有字體回歸標準細度 */
      background-color: #ffcfdc;
      color: #000000;
      -webkit-tap-highlight-color: transparent;
    }


    /* 🎯 標題專屬：最粗、最可愛、不疊加髒髒顏色的立體字 */
    .comic-title {
      color: #ffffff !important;
      text-shadow: 3px 3px 0px #ec4899;
      -webkit-text-stroke: 0px !important;
      letter-spacing: 2px;
      font-weight: 900 !important;
      /* 只有標題擁有最粗的特權 (900) */
    }

    /* 🎯 說明段落專屬：強制瘦身，優雅好讀 */
    p,
    span {
      font-weight: 400 !important;
      /* 強制一般文字變回標準細度 (400) */
    }

    /* Comic 3D Buttons */
    .btn-pop {
      border: 2px solid rgba(255, 255, 255, 0.8);
      font-weight: 700 !important;
      /* 按鈕稍微有點份量比較好看 (700) */
      box-shadow: 4px 4px 0px rgba(255, 255, 255, 0.4);
      transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-pop:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px rgba(255, 255, 255, 0.4);
    }

    .btn-pop:active {
      transform: translate(4px, 4px) !important;
      box-shadow: 0px 0px 0px rgba(255, 255, 255, 0) !important;
    }

    /* Active state */
    .btn-pop-active {
      background-color: #ec4899;
      color: #000;
      border: 2px solid #ec4899;
      box-shadow: 4px 4px 0px rgba(236, 72, 153, 0.5);
    }

    .btn-pop-active:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px rgba(236, 72, 153, 0.5);
    }

    .btn-pop-active:active {
      transform: translate(4px, 4px) !important;
      box-shadow: 0px 0px 0px rgba(236, 72, 153, 0) !important;
    }

    /* Comic Headers */
    .comic-title {
      color: #fff;
      text-shadow: 4px 4px 0 rgba(236, 72, 153, 0.8);
      -webkit-text-stroke: 1.5px #ec4899;
    }

    /* Custom Scrollbar - Y2K Style */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #000;
      border-left: 1px solid #333;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #ec4899;
      /* Pink-500 */
      border: 2px solid #000;
      border-radius: 0;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }

    .animate-fade-in {
      animation: fadeInUp 0.3s ease-out forwards;
    }

    @keyframes float {
      0% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-8px) rotate(0.5deg);
      }

      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }

    @keyframes neon-pulse {

      0%,
      100% {
        filter: drop-shadow(0 0 5px rgba(236, 72, 153, 0.4));
      }

      50% {
        filter: drop-shadow(0 0 15px rgba(236, 72, 153, 0.8));
      }
    }

    .animate-neon {
      animation: neon-pulse 2s infinite;
    }

    /* Marquee Animation */
    @keyframes marquee {
      0% {
        transform: translateX(100%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .animate-marquee {
      animation: marquee 20s linear infinite;
    }

    /* Loader Animation */
    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spin-reverse {
      from {
        transform: rotate(360deg);
      }

      to {
        transform: rotate(0deg);
      }
    }

    .loader-circle {
      border-top-color: transparent;
      border-bottom-color: transparent;
      border-left-color: #ec4899;
      border-right-color: #ec4899;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
